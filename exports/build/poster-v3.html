<!doctype html>
<html lang="he" dir="rtl"><head><meta charset="utf-8"/>
<style>
  :root{--bg:#070b11;--gold:#f2c14e;--ink:#0b0f16;--line:#243140;--txt:#eef3f9;--mut:#9fb0c2;--accent:#d62027;
    --font:'Segoe UI',system-ui,Tahoma,Arial,sans-serif;--mono:ui-monospace,'Cascadia Code',Consolas,monospace}
  *{margin:0;box-sizing:border-box}
  html,body{background:var(--bg)}
  .poster{width:3508px;height:2480px;position:relative;overflow:hidden;
    background:
      radial-gradient(2600px 1700px at 50% 46%, #121d2b 0%, #0a121b 48%, #070b11 100%),
      linear-gradient(0deg,#070b11,#0a0f17);}
  .grid{position:absolute;inset:0;background-image:linear-gradient(#0f1a26 1px,transparent 1px),linear-gradient(90deg,#0f1a26 1px,transparent 1px);
    background-size:64px 64px;opacity:.5;-webkit-mask-image:radial-gradient(120% 100% at 50% 46%,#000 60%,transparent 100%)}
  svg{position:absolute;inset:0;width:100%;height:100%}
</style></head>
<body>
<div class="poster"><div class="grid"></div><svg id="p" viewBox="0 0 3508 2480"></svg></div>
<script>/*__D3__*/</script>
<script>
const DATA=/*__DATA__*/;
const color=m=>DATA.palette[m]||'#8493a6';
const tByName=Object.fromEntries(DATA.tables.map(t=>[t.name,t]));
const sharedSet=new Set(DATA.shared.map(s=>s.name));
const svg=d3.select('#p');
const W=3508,H=2480,cx=W/2,cy=H/2+30;

// ---------- defs ----------
const defs=svg.append('defs');
defs.append('filter').attr('id','glow').attr('x','-60%').attr('y','-60%').attr('width','220%').attr('height','220%')
  .html('<feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>');
defs.append('filter').attr('id','soft').attr('x','-40%').attr('y','-40%').attr('width','180%').attr('height','180%')
  .html('<feGaussianBlur stdDeviation="10" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>');
['cross','spoke'].forEach(k=>{const c=k==='cross'?'#f2c14e':'#3a4a5d';
  defs.append('marker').attr('id','arr-'+k).attr('viewBox','0 0 10 10').attr('refX',9).attr('refY',5).attr('markerWidth',7).attr('markerHeight',7).attr('orient','auto-start-reverse')
    .append('path').attr('d','M0,0L10,5L0,10z').attr('fill',c);});
const grad=defs.append('radialGradient').attr('id','coreg');
grad.append('stop').attr('offset','0%').attr('stop-color','#3a2f12');
grad.append('stop').attr('offset','70%').attr('stop-color','#1a160c');
grad.append('stop').attr('offset','100%').attr('stop-color','#0c0f15');

// ---------- header ----------
const hd=svg.append('g');
hd.append('rect').attr('x',64).attr('y',54).attr('width',96).attr('height',96).attr('rx',22).attr('fill','#d62027');
hd.append('text').attr('x',112).attr('y',118).attr('text-anchor','middle').attr('font','800 40px var(--font)').attr('fill','#fff').text('NEO');
hd.append('text').attr('x',3444).attr('y',104).attr('text-anchor','end').attr('font','800 58px var(--font)').attr('fill','#fff').text('מפת תשתית SAP — נוף ארגוני מלא');
hd.append('text').attr('x',3444).attr('y',150).attr('text-anchor','end').attr('font','600 28px var(--font)').attr('fill','var(--mut)').text('ECC6 → S/4HANA · Enterprise Infrastructure Map · CBC Israel');
const cc=DATA.meta.counts;
hd.append('text').attr('x',3444).attr('y',196).attr('text-anchor','end').attr('font','700 24px var(--mono)').attr('fill','var(--gold)')
  .text(`${cc.tables} TABLES · ${cc.modules} MODULES · ${cc.edges} LINKS · ${cc.shared} SHARED · ${cc.interfaces} INTERFACES`);

// ---------- module pods around center ----------
const mods=DATA.modules; // 12 modules; + PI/PO pod
const byCode=Object.fromEntries(mods.map(m=>[m.code,{code:m.code,he:m.he,name:m.name}]));
byCode['PIPO']={code:'PIPO',he:'ממשקי PI/PO',name:'PI/PO Interfaces'};
// explicit clock order — giants (PM, PP-PI) placed opposite; big logistics on the wide sides
const order=['PM','MM','QM','BATCH','FI','IDOC','PP-PI','SD','CS','CLASS','CO','PP','PIPO'];
const podDefs=order.map(c=>byCode[c]).filter(Boolean);
const n=podDefs.length;
const Rx=1420,Ry=1015, cap=10;
const angleStart=-90; // start at top
const tablePos={}; const podPos={};
const pods=podDefs.map((m,i)=>{
  const ang=(angleStart + i*(360/n))*Math.PI/180;
  const x=cx+Rx*Math.cos(ang), y=cy+Ry*Math.sin(ang);
  let list = m.code==='PIPO' ? [] : DATA.tables.filter(t=>t.mod===m.code).sort((a,b)=>b.degree-a.degree);
  const total=list.length; if(list.length>cap) list=list.slice(0,cap);
  return {...m,ang,x,y,list,total};
});

// links layer (drawn first, under pods)
const linkL=svg.append('g'); const podL=svg.append('g'); const coreL=svg.append('g');

// ---------- pods ----------
pods.forEach(p=>{
  const cols=Math.min(4,Math.max(2,Math.ceil(Math.sqrt(p.list.length||1))));
  const rows=Math.ceil((p.list.length||1)/cols);
  const chipW=150,chipH=34,gx=10,gy=8, padX=18, headH=64;
  const bodyW=cols*chipW+(cols-1)*gx, podW=bodyW+padX*2;
  const podH=headH+rows*chipH+(rows-1)*gy+18 + (p.total>p.list.length?22:0);
  const x0=p.x-podW/2, y0=p.y-podH/2;
  podPos[p.code]={x:p.x,y:p.y};
  const g=podL.append('g');
  g.append('rect').attr('x',x0).attr('y',y0).attr('width',podW).attr('height',podH).attr('rx',22)
    .attr('fill','#0c1521e8').attr('stroke',color(p.code)).attr('stroke-width',3).attr('filter','url(#soft)');
  g.append('rect').attr('x',x0).attr('y',y0).attr('width',podW).attr('height',9).attr('rx',4).attr('fill',color(p.code));
  g.append('text').attr('x',x0+padX).attr('y',y0+46).attr('font','800 34px var(--mono)').attr('fill','#fff').text(p.code);
  g.append('text').attr('x',x0+podW-padX).attr('y',y0+46).attr('text-anchor','end').attr('font','600 21px var(--font)').attr('fill',color(p.code)).text(p.he);
  p.list.forEach((t,i)=>{
    const r=Math.floor(i/cols), c=i%cols;
    const tx=x0+padX+c*(chipW+gx), ty=y0+headH+r*(chipH+gy);
    tablePos[t.name]={x:tx+chipW/2,y:ty+chipH/2};
    const cg=g.append('g');
    cg.append('rect').attr('x',tx).attr('y',ty).attr('width',chipW).attr('height',chipH).attr('rx',7)
      .attr('fill',t.real?'#0f1a26':'#161a22').attr('stroke',sharedSet.has(t.name)?'var(--gold)':color(t.mod))
      .attr('stroke-width',sharedSet.has(t.name)?2.4:1.3).attr('stroke-dasharray',t.real?'0':'4 3');
    cg.append('rect').attr('x',tx).attr('y',ty).attr('width',5).attr('height',chipH).attr('rx',2.5).attr('fill',color(t.mod));
    cg.append('text').attr('x',tx+14).attr('y',ty+23).attr('font','700 19px var(--mono)').attr('fill',sharedSet.has(t.name)?'var(--gold)':'#e6eef6').text(t.name.length>13?t.name.slice(0,12)+'…':t.name);
  });
  if(p.total>p.list.length)
    g.append('text').attr('x',p.x).attr('y',y0+podH-12).attr('text-anchor','middle').attr('font','700 17px var(--mono)').attr('fill','var(--mut)').text(`+${p.total-p.list.length} עוד טבלאות`);
});

// ---------- spokes pod -> core ----------
pods.forEach(p=>{
  linkL.append('path').attr('fill','none').attr('stroke','#33485d').attr('stroke-opacity',.35).attr('stroke-width',3)
    .attr('d',`M${p.x},${p.y} Q${(p.x+cx)/2},${(p.y+cy)/2} ${cx+ (p.x>cx?260:-260)*0},${cy}`)
    .attr('d',`M${cx},${cy} L${p.x},${p.y}`).attr('marker-start','url(#arr-spoke)');
});

// ---------- cross-module table-to-table arrows ----------
const posOf=name=> tablePos[name] || (tByName[name]&&podPos[tByName[name].mod]) || podPos[ (DATA.shared.find(s=>s.name===name)?'SHARED':null) ];
DATA.edges.filter(e=>e.cross).forEach(e=>{
  const a=tablePos[e.from]||podPos[(tByName[e.from]||{}).mod], b=tablePos[e.to]||podPos[(tByName[e.to]||{}).mod];
  if(!a||!b) return;
  const mx=(a.x+b.x)/2+(a.y-b.y)*0.08, my=(a.y+b.y)/2+(b.x-a.x)*0.08;
  linkL.append('path').attr('fill','none').attr('stroke','var(--gold)').attr('stroke-opacity',.5).attr('stroke-width',2.4)
    .attr('d',`M${a.x},${a.y} Q${mx},${my} ${b.x},${b.y}`).attr('marker-end','url(#arr-cross)').attr('filter','url(#glow)');
});

// ---------- central golden SAP core + shared ring ----------
const Rcore=300, Rring=200;
coreL.append('circle').attr('cx',cx).attr('cy',cy).attr('r',Rcore).attr('fill','url(#coreg)').attr('stroke','var(--gold)').attr('stroke-width',4).attr('filter','url(#glow)');
coreL.append('circle').attr('cx',cx).attr('cy',cy).attr('r',Rcore+16).attr('fill','none').attr('stroke','var(--gold)').attr('stroke-opacity',.3).attr('stroke-width',2);
coreL.append('text').attr('x',cx).attr('y',cy-Rcore+58).attr('text-anchor','middle').attr('font','800 40px var(--font)').attr('fill','var(--gold)').text('SAP CORE');
coreL.append('text').attr('x',cx).attr('y',cy-Rcore+92).attr('text-anchor','middle').attr('font','600 22px var(--font)').attr('fill','#cdb978').text('אובייקטים משותפים');
// shared 14 in inner ring
DATA.shared.forEach((s,i)=>{
  const ang=(i/DATA.shared.length)*Math.PI*2 - Math.PI/2;
  const x=cx+Rring*Math.cos(ang), y=cy+Rring*Math.sin(ang);
  tablePos[s.name]=tablePos[s.name]||{x,y};
  const r=26+Math.sqrt(s.degree||s.span*2)*4.2;
  const g=coreL.append('g');
  g.append('circle').attr('cx',x).attr('cy',y).attr('r',r).attr('fill','#15110a').attr('stroke','var(--gold)').attr('stroke-width',s.degree>=10?4:2.4);
  g.append('text').attr('x',x).attr('y',y+6).attr('text-anchor','middle').attr('font','800 17px var(--mono)').attr('fill','#fff').text(s.name);
});

// ---------- legend ----------
const lg=svg.append('g').attr('transform',`translate(64,${H-360})`);
lg.append('rect').attr('x',0).attr('y',0).attr('width',640).attr('height',300).attr('rx',20).attr('fill','#0b1019e6').attr('stroke','var(--line)').attr('stroke-width',2);
lg.append('text').attr('x',26).attr('y',46).attr('font','800 26px var(--font)').attr('fill','var(--gold)').text('מקרא · LEGEND');
const items=[
  ['קו זהב = קשר חוצה-מודול','#f2c14e'],['עיגול זהב = אובייקט משותף (SAP Core)','#f2c14e'],
  ['מסגרת מלאה = טבלה בחילוץ אמיתי','#3fb950'],['מסגרת מקווקוות = מודל קנוני','#8493a6'],
];
items.forEach((it,i)=>{lg.append('rect').attr('x',26).attr('y',74+i*40).attr('width',26).attr('height',26).attr('rx',5).attr('fill',it[1]).attr('opacity',.85);
  lg.append('text').attr('x',64).attr('y',94+i*40).attr('font','600 21px var(--font)').attr('fill','var(--txt)').text(it[0]);});
// module color legend
const ml=svg.append('g').attr('transform',`translate(${W-720},${H-360})`);
ml.append('rect').attr('x',0).attr('y',0).attr('width',656).attr('height',300).attr('rx',20).attr('fill','#0b1019e6').attr('stroke','var(--line)').attr('stroke-width',2);
ml.append('text').attr('x',26).attr('y',46).attr('font','800 26px var(--font)').attr('fill','#fff').text('מודולים · MODULES');
DATA.modules.forEach((m,i)=>{const c=i%3,r=Math.floor(i/3);const xx=26+c*210,yy=74+r*52;
  ml.append('circle').attr('cx',xx+11).attr('cy',yy+10).attr('r',11).attr('fill',color(m.code));
  ml.append('text').attr('x',xx+32).attr('y',yy+17).attr('font','600 19px var(--mono)').attr('fill','var(--txt)').text(m.code+' · '+m.he);});

// footer credit
svg.append('text').attr('x',cx).attr('y',H-26).attr('text-anchor','middle').attr('font','600 22px var(--font)').attr('fill','var(--mut)')
  .text('נבנה ע״י Sali Halif — Web Coding · NEO Cockpit · CBC Israel · 2026 · מקור אמת יחיד: sap-infrastructure-data.json');

document.body.setAttribute('data-ready','1');
</script>
</body></html>
