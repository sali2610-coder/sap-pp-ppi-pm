<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #ffffff; overflow: hidden; }
    #root { display: inline-block; }
    #root svg { display: block; }
  </style>
  <!-- Offline vendored bundles — no CDN at render time -->
  <script src="vendor/react.production.min.js"></script>
  <script src="vendor/react-dom.production.min.js"></script>
  <script src="vendor/excalidraw.production.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script>
    window.EXCALIDRAW_ASSET_PATH = "/";
    window.renderDiagram = async function (jsonData) {
      try {
        const lib = window.ExcalidrawLib;
        if (!lib || !lib.exportToSvg) throw new Error("ExcalidrawLib not loaded");
        const data = typeof jsonData === "string" ? JSON.parse(jsonData) : jsonData;
        const elements = data.elements || [];
        const appState = data.appState || {};
        appState.viewBackgroundColor = appState.viewBackgroundColor || "#ffffff";
        appState.exportWithDarkMode = false;
        const svg = await lib.exportToSvg({
          elements: elements,
          appState: { ...appState, exportBackground: true },
          files: data.files || {},
        });
        const root = document.getElementById("root");
        root.innerHTML = "";
        root.appendChild(svg);
        window.__renderComplete = true;
        window.__renderError = null;
        return { success: true, width: svg.getAttribute("width"), height: svg.getAttribute("height") };
      } catch (err) {
        window.__renderComplete = true;
        window.__renderError = err.message;
        return { success: false, error: err.message };
      }
    };
    // ExcalidrawLib is synchronous via <script>, so ready immediately
    window.__moduleReady = !!(window.ExcalidrawLib && window.ExcalidrawLib.exportToSvg);
  </script>
</body>
</html>
