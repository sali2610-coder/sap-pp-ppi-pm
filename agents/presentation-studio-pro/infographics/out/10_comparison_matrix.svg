<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" font-family="Arial, sans-serif">
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <text x="64" y="64" font-size="30" font-weight="700" fill="#1F4E79">Comparison Matrix (template)</text>
  <!-- 4 criteria x 3 options. Replace headers/cells; use ✓/✗/~ marks. -->
  <g font-size="20" fill="#1F2937">
    <!-- header -->
    <rect x="64" y="110" width="380" height="60" fill="#1F4E79"/><text x="84" y="148" fill="#fff">Criterion</text>
    <rect x="448" y="110" width="256" height="60" fill="#2E75B6"/><text x="468" y="148" fill="#fff">Option A</text>
    <rect x="708" y="110" width="256" height="60" fill="#2E75B6"/><text x="728" y="148" fill="#fff">Option B</text>
    <rect x="968" y="110" width="248" height="60" fill="#2E75B6"/><text x="988" y="148" fill="#fff">Option C</text>
    <!-- rows -->
    <g>
      <rect x="64" y="172" width="1152" height="120" fill="#F4F5F7"/>
      <text x="84" y="240">Cost</text>
      <text x="556" y="240" text-anchor="middle" fill="#16A34A">✓ low</text>
      <text x="816" y="240" text-anchor="middle" fill="#B45309">~ med</text>
      <text x="1072" y="240" text-anchor="middle" fill="#DC2626">✗ high</text>
    </g>
    <g>
      <rect x="64" y="294" width="1152" height="120" fill="#FFFFFF"/>
      <text x="84" y="362">Speed</text>
      <text x="556" y="362" text-anchor="middle" fill="#B45309">~ med</text>
      <text x="816" y="362" text-anchor="middle" fill="#16A34A">✓ fast</text>
      <text x="1072" y="362" text-anchor="middle" fill="#16A34A">✓ fast</text>
    </g>
    <g>
      <rect x="64" y="416" width="1152" height="120" fill="#F4F5F7"/>
      <text x="84" y="484">Risk</text>
      <text x="556" y="484" text-anchor="middle" fill="#16A34A">✓ low</text>
      <text x="816" y="484" text-anchor="middle" fill="#DC2626">✗ high</text>
      <text x="1072" y="484" text-anchor="middle" fill="#B45309">~ med</text>
    </g>
    <g>
      <rect x="64" y="538" width="1152" height="110" fill="#FFFFFF"/>
      <text x="84" y="600">Fit</text>
      <text x="556" y="600" text-anchor="middle" fill="#16A34A">✓ strong</text>
      <text x="816" y="600" text-anchor="middle" fill="#B45309">~ ok</text>
      <text x="1072" y="600" text-anchor="middle" fill="#16A34A">✓ strong</text>
    </g>
  </g>
</svg>
