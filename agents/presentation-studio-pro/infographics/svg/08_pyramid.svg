<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" font-family="Arial, sans-serif">
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <text x="64" y="64" font-size="30" font-weight="700" fill="#1F4E79">Pyramid (template)</text>
