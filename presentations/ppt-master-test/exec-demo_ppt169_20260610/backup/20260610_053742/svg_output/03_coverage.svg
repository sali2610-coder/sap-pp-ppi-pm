<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <g font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
    <rect x="80" y="72" width="6" height="44" fill="#D62027"/>
    <text x="104" y="108" font-size="40" font-weight="800" fill="#13151A">Coverage Snapshot</text>

    <!-- PP-PI -->
    <rect x="80" y="190" width="540" height="200" rx="10" fill="#13151A"/>
    <text x="116" y="250" font-size="24" font-weight="700" fill="#FFFFFF">PP-PI</text>
    <text x="116" y="300" font-size="60" font-weight="800" fill="#D62027">68</text>
    <text x="200" y="300" font-size="22" fill="#C7CBD4">tables</text>
    <text x="320" y="300" font-size="60" font-weight="800" fill="#FFFFFF">326</text>
    <text x="440" y="300" font-size="22" fill="#C7CBD4">fields</text>
    <text x="116" y="348" font-size="17" fill="#8A909B">Process orders · recipes · batches</text>

    <!-- PM -->
    <rect x="660" y="190" width="540" height="200" rx="10" fill="#13151A"/>
    <text x="696" y="250" font-size="24" font-weight="700" fill="#FFFFFF">PM</text>
    <text x="696" y="300" font-size="60" font-weight="800" fill="#D62027">58</text>
    <text x="780" y="300" font-size="22" fill="#C7CBD4">tables</text>
    <text x="900" y="300" font-size="60" font-weight="800" fill="#FFFFFF">280</text>
    <text x="1020" y="300" font-size="22" fill="#C7CBD4">fields</text>
    <text x="696" y="348" font-size="17" fill="#8A909B">Equipment · func. locations · notifications</text>

    <!-- Total -->
    <rect x="80" y="420" width="1120" height="150" rx="10" fill="#F4F5F7"/>
    <rect x="80" y="420" width="6" height="150" fill="#D62027"/>
    <text x="130" y="478" font-size="22" font-weight="700" fill="#13151A">Total</text>
    <text x="130" y="540" font-size="48" font-weight="800" fill="#D62027">126 tables</text>
    <text x="430" y="540" font-size="48" font-weight="800" fill="#13151A">606 fields</text>
    <text x="760" y="510" font-size="18" fill="#4B515C">Asserted at build time — the build fails</text>
    <text x="760" y="538" font-size="18" fill="#4B515C">if table counts drift.</text>

    <text x="80" y="660" font-size="14" font-weight="600" fill="#9AA0AB">Project NEO Cockpit · CBC Israel</text>
    <text x="1200" y="660" font-size="14" font-weight="600" fill="#9AA0AB" text-anchor="end">3 / 5</text>
  </g>
</svg>
