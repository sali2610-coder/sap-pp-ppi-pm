    <line x1="150" y1="280" x2="1130" y2="280" stroke="#3A3D45" stroke-width="3"/>

    <g text-anchor="middle">
      <circle cx="270" cy="280" r="20" fill="#D62027"/>
      <text x="270" y="287" font-size="18" font-weight="800" fill="#FFFFFF">1</text>
      <text x="270" y="350" font-size="22" font-weight="700" fill="#FFFFFF">Sign-off</text>
      <text x="270" y="384" font-size="17" fill="#A8AEB9">Functional review of PM</text>
